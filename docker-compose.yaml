version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardtheweights-backend
    expose:
      - "8000"   # internal only
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - guardtheweights-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: guardtheweights-nginx
    ports:
      - "80:80"   # ONLY public port
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - guardtheweights-network
    restart: always

networks:
  guardtheweights-network:
    driver: bridge