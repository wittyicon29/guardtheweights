version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardtheweights-backend
    expose:
      - "8000"   # internal only
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - guardtheweights-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always

  nginx:
    image: nginx:alpine
    container_name: guardtheweights-nginx
    ports:
      - "80:80"   # ONLY public port
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - guardtheweights-network
    restart: always

networks:
  guardtheweights-network:
    driver: bridge