services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardtheweights-backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - guardtheweights-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: guardtheweights-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - guardtheweights-network
    restart: always

  certbot:
    image: certbot/certbot
    container_name: guardtheweights-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        certbot renew;
        sleep 12h & wait $${!};
      done;"
    networks:
      - guardtheweights-network

networks:
  guardtheweights-network:
    driver: bridge