# Fly.io configuration
app = "echoes-aethermoor"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  FRONTEND_URL = "https://your-frontend-domain.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[checks]
  [checks.alive]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
