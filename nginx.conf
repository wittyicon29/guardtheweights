user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;

    upstream backend {
        server guardtheweights-backend:8000;
    }

    ##################################################
    # HTTP → Redirect to HTTPS
    ##################################################
    server {
        listen 80;
        listen [::]:80;
        server_name 16.170.201.163.sslip.io;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    ##################################################
    # HTTPS (Port 443)
    ##################################################
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name 16.170.201.163.sslip.io;

        ssl_certificate /etc/letsencrypt/live/16.170.201.163.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/16.170.201.163.sslip.io/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Frontend
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}